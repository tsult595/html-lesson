<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Pizza Mizza</title>
</head>
<body>
    <header class="w-full border-b-2 border-gray-200">
        <div class="flex justify-between items-center p-10 h-20  w-[85%] m-auto">
            <div>
                <img src="./pizzamizza.png" alt="Pizza Mizza Logo" class="h-8">
            </div>
            <div class="flex gap-5">
                <img src="./1415.png" alt="" class="h-8">
                <img src="./24-7-az.png" alt="" class="h-8">
            </div>
        </div>
    </header>
    <div class="px-10 py-3 sticky top-0 bg-white z-10 w-full m-auto">
        <div class="w-[85%] m-auto flex justify-between items-center" >
            <div class="flex gap-5">
                <a class="hover:text-red-500" href="">Pizza</a>
                <a class="hover:text-red-500" href="">Pideler</a>
                <a class="hover:text-red-500" href="">Kabablar</a>
               
            </div>
            <button class="w-16 h-16 rounded-full border border-gray-300 text-gray-500 hover:bg-gray-300">Sebet</button>
        </div>
    </div>
    <div class="w-[80%] m-auto">
            <div class="flex flex-col gap-5">
              <div class="flex justify-between p-10 items-center border-2 border-gray-200 rounded-lg relative h-[403px]">
                  <button onclick="backFn()" id="back" class="w-16 h-16 rounded-full bg-gray-200 text-gray-500 hover:bg-gray-300 absolute -left-5 top-1/2 -translate-y-1/2 z-2 text-white text-[50px] text-center">‹</button>
                     <div id="slideWrapper" class="flex gap-5 transition-all duration-500">
                    <img class="h-full" src="./1a4a5f81671fd08eeca3e9378bc65218.png" alt="">
                    </div>
                    <button onclick="forwardFn()" id="forward" class="w-16 h-16 rounded-full bg-gray-200 text-gray-500 hover:bg-gray-300 absolute -right-5 top-1/2 -translate-y-1/2 z-2 text-white text-[50px] text-center">›</button>
                    <div id="lineWrapper" class="flex gap-5 absolute bottom-[20px] left-1/2 -translate-x-1/2 -translate-y-1/2">
                      <div onclick="lineFn()" class="w-[50px] h-1 bg-red-500"></div>
                      <div class="w-[50px] h-1 bg-black"></div>
                      <div class="w-[50px] h-1 bg-black"></div>
                      <div class="w-[50px] h-1 bg-black"></div>
                    </div>
              </div>  
            </div>
            <div id="container" class="px-10 mt-10 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 relative">
            </div>
            
        </div>
         <div id="modalWrapper" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
    
         <div id="modal" class="bg-white rounded-xl w-[400px] p-5 relative top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2">
           
        
       </div>

      </div>
    <script src="./pizzaPizza.js"></script>
</body>
</html>
