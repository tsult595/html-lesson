<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    *{
        padding: 0;
        margin: 0;
        box-sizing: border-box;
    }    
    .all{
        width: 100%;
        height: 100vh;
        background-color: rgb(201, 227, 218);
        display: flex;
        align-items: center;
    }
    .formWrapper{
      width: 60%;
      margin: 0 auto;
      background-color: white;
      padding: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    input{
    width: 30%;
    padding: 15px;
    border: none;
    }
    input:focus{
        border: 1px solid rgb(71, 209, 209);
    }
    button{
        padding: 15px;
        background-color: rgb(71, 209, 209);
        border: none;
    }
    .welcome{
        font-size: 20px;
        color: rgb(9, 41, 41);
    }
    </style>
</head>
<body>
    <div class="all">
     <div class="formWrapper">
        <h1>Form</h1>
        <p id="welcome"></p>
        <input id="nameinp" placeholder="name" type="text">
        <input id="surNameinp" placeholder="sur name" type="text">
        <button onclick="login()">Submit</button>
     </div>
    </div>
    <script src="./login.js"></script>
</body>
</html>
