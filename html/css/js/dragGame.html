<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Document</title>
</head>
<body>
    <div class="min-h-screen flex justify-center items-center bg-blue-100">
       <div class="flex flex-col items-center gap-7 border-2 border-gray-300 p-5 rounded-2xl bg-white">
        <h1>Game</h1>
        <div class="flex gap-3">
           <div id="dragItem" draggable="true"  data-type="land" class="text-4xl bg-gray-200">🦣</div>
           <div id="dragItem" draggable="true" data-type="sky" class="text-4xl bg-gray-200">🦜</div>
           <div id="dragItem" draggable="true" data-type="land" class="text-4xl bg-gray-200">🐪</div>
           <div id="dragItem" draggable="true" data-type="land" class="text-4xl bg-gray-200">🐒</div>
           <div id="dragItem" draggable="true" data-type="sea" class="text-4xl bg-gray-200">🦈</div>
           <div id="dragItem" draggable="true" data-type="sea" class="text-4xl bg-gray-200">🐋</div>
           <div id="dragItem" draggable="true" data-type="sky" class="text-4xl bg-gray-200">🪿</div>
        </div>
        <div class="flex gap-5 w-[580px]">
            <div id="dropZone" data-accept="land" class="flex flex-col gap-4 bg-green-300 flex-1">
              <h3>Land</h3>
            </div>
            <div id="dropZone" data-accept="sea" class="flex flex-col gap-4 bg-blue-200 flex-1">
              <h3>Sea</h3>
            </div>
            <div id="dropZone" data-accept="sky" class="flex flex-col gap-4 bg-blue-300 flex-1">
              <h3>Sky</h3>
            </div>
           
        </div>
       </div>
    </div>
    <script src="./dragGame.js"></script>
</body>
</html>
