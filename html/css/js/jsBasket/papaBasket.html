        const display = document.querySelector("#container");
        const count = document.querySelector("#cart-elements-count")
        const cartDrwaer = document.querySelector("#cart-elements"); 
        const cartCount = document.querySelector("#cart-total")
        const search = document.querySelector("#search")
        
        let filteredItems = data.data.food

        const apply = function(){
            const searchValue = search.value.toLowerCase().trim();
            if(searchValue){
                filteredItems = data.data.food.filter(item => (
                    item.category.toLowerCase().includes(searchValue)
                    || item.name.toLowerCase().includes(searchValue)
                    || item.composition.toLowerCase().includes(searchValue)
                ))
            } else {
                filteredItems = data.data.food
            }
            render()
        }

        function searchFinder() {
            apply()
        }
        
        const render = function(){
            display.innerHTML = ''
            filteredItems.forEach((product)=>{
                display.innerHTML += `
                <div class="card" style="width: 18rem;">
                    <img src="${product.img}" class="card-img-top" alt="...">
                    <div class="card-body">
                        <h5 class="card-title">${product.name}</h5>
                        <p class="card-text">${product.composition}, ${product.category}</p>
                        <a href="#" class="btn btn-primary" onclick="addToCard(${product.id})">${product.price}AZN</a>
                    </div>
                </div>`
            })
        }

    

            let cart = []
            const addToCard = function(i){
            let items = data.data.food
            let product = items.find(item => item.id === i);
            if (!product) return;
            
            
            if (cart.find(item => item.id === i)) {
                alert("səbətdədir!");
                return; 
            }

              
            cart.push({
                ...product,
                quantity: 1,   
                maxQuantity: product.quantity  
            })
            
         
            count.innerText = +count.innerText + 1
            let total = cart.reduce((a,b)=>a+b.price * b.quantity,0)
            
            cartCount.innerHTML = total 

            cartDrwaer.innerHTML += `
                    <div class="card mb-3" style="max-width: 540px;" id="cart-item-${product.id}">
                        <div class="row g-0">
                            <div class="col-md-4">
                                <img src="${product.img}" class="img-fluid rounded-start" alt="...">
                            </div>
                            <div class="col-md-8">
                                <div class="card-body">
                                    <h5 class="card-title">${product.name}</h5>
                                    <p class="card-text">${product.composition}, ${product.category}</p>
                                    <p class="card-text"><small class="text-muted">${product.price}AZN</small></p>
                                     <button onclick="plus(${product.id})">+</button>
                                     <span id="qty-${product.id}">1</span>
                                     <button onclick="minus(${product.id})">-</button>
                                     <button onclick="deleteItem(${product.id})">delete</button>
                                </div>
                            </div>
                        </div>
                    </div>
                     `        
            }
            
            const plus = function(i){
                let item = cart.find(el => el.id === i)
                if(item && item.quantity < item.maxQuantity){
                    item.quantity++
                    document.getElementById(`qty-${i}`).innerText = item.quantity
                    updateTotal()
                }
            }

            const minus = function(i){
                let item = cart.find(el => el.id === i)
                if(item && item.quantity > 1){
                    item.quantity -= 1
                    document.getElementById(`qty-${i}`).innerText = item.quantity
                    updateTotal()
                }
            }
            
            
            
            const updateTotal = function(){
                let total = cart.reduce((a,b)=>a + (b.price * b.quantity), 0)
                cartCount.innerHTML = total
            }
