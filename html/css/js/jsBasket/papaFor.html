        const display = document.querySelector("#container");
        const count = document.querySelector("#cart-elements-count")
        const cartDrwaer = document.querySelector("#cart-elements"); 
        const cartCount = document.querySelector("#cart-total")
        const search = document.querySelector("#search")
        const formSelect = document.querySelector('#form-select')

    let card = []

    function renderCards(products) {
        display.innerHTML = ""; 
        products.forEach((item) => {
            display.innerHTML += `
                <div class="card" style="width: 18rem;">
                    <img src="${item.img}" class="card-img-top" alt="...">
                    <div class="card-body">
                        <h5 class="card-title">${item.name}</h5>
                        <p class="card-text">${item.composition}</p>
                        <p class="badge bg-secondary">${item.category}</p>
                        <br>
                        <button class="btn btn-primary" onclick="addToCard(${item.id})">
                            ${item.price} AZN
                        </button>
                    </div>
                </div>`;
        });
    }

    function renderCart() {
        cartDrwaer.innerHTML = ''
        count.innerText = card.length
        let total = 0
        
        card.forEach(product => {
            total += product.price * product.quantity
            cartDrwaer.innerHTML += `
                <div class="card mb-3" style="max-width: 540px;" id="cart-item-${product.id}">
                    <div class="row g-0">
                        <div class="col-md-4">
                            <img src="${product.img}" class="img-fluid rounded-start" alt="...">
                        </div>
                        <div class="col-md-8">
                            <div class="card-body">
                                <h5 class="card-title">${product.name}</h5>
                                <p class="card-text">${product.composition}, ${product.category}</p>
                                <p class="card-text"><small class="text-muted">${product.price}AZN</small></p>
                                <button onclick="plus(${product.id})">+</button>
                                <span id="qty-${product.id}">${product.quantity}</span>
                                <button onclick="minus(${product.id})">-</button>
                                <button onclick="deleteItem(${product.id})">delete</button>
                            </div>
                        </div>
                    </div>
                </div>` 
        })
        cartCount.innerHTML = total
    }

    renderCards(data.data.food);

    function searchFinder() {
        const query = search.value.toLowerCase();
        const filteredFood = data.data.food.filter(item => {
            return item.name.toLowerCase().includes(query) || 
                   item.category.toLowerCase().includes(query);
        });
        renderCards(filteredFood);
    }

    const addToCard = function(i){
        let find = card.find(item => item.id === i)
        if(find){
            find.quantity++
        } else {
            let item = data.data.food.find(item => item.id === i)
            card.push({...item, quantity: 1})
        }
        renderCart()  
    }

    const plus = function(i){
        let item = card.find(el => el.id === i)
        if(item && item.quantity < item.quantity){
            item.quantity++
            renderCart()
        }
    }

    const minus = function(i){
        let item = card.find(el => el.id === i)
        if(item && item.quantity > 1){
            item.quantity--
            renderCart()
        }
    }

    const deleteItem = function(i){
        card = card.filter(item => item.id !== i)
        renderCart()
    }

    function weSort(){
        const selectedCategory = formSelect.value
        if(!selectedCategory || selectedCategory === "Bütün"){
            renderCards(data.data.food)
        } else {
            let filtered = data.data.food.filter(item => item.category === selectedCategory)
            renderCards(filtered)
        }
    }

    // Populate category options
    formSelect.innerHTML += '<option value="">All Categories</option>'
    data.data.category.forEach(cat => {
        if(cat !== "Bütün"){
            formSelect.innerHTML += `<option value="${cat}">${cat}</option>`
        }
    })
