<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <nav class="w-full bg-white border-b border-gray-200 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 py-3">

            <!-- Top Row -->
            <div class="flex flex-wrap items-center gap-3">

                <!-- Brand -->
                <div class="text-lg font-semibold text-gray-900">
                    AutoFilter
                </div>
                <input oninput="searchFn()" id="search" type="text" placeholder="Brand" class="px-3 py-2 text-sm border rounded-lg focus:outline-none focus:ring-2 focus:ring-black">

                <!-- Brand Select -->
                <select oninput="filterFn()" id="marka" class="px-3 py-2 text-sm border rounded-lg focus:outline-none focus:ring-2 focus:ring-black">
                <option value=""></option>
                </select>

                <!-- Model -->
                <select oninput="filterFn()" id="model" class="px-3 py-2 text-sm border rounded-lg focus:outline-none focus:ring-2 focus:ring-black">
                    
                    
                </select>

                <!-- Ban Type -->
                <select oninput="filterFn()" class="px-3 py-2 text-sm border rounded-lg focus:outline-none focus:ring-2 focus:ring-black">
                    <option>Ban Type</option>
                    <option>Offroader / SUV</option>
                </select>

                <!-- City -->
                <select oninput="filterFn()" id="city" class="px-3 py-2 text-sm border rounded-lg focus:outline-none focus:ring-2 focus:ring-black">
                   
                   
                </select>

                <!-- Year -->
                <select oninput="filterFn()" id="year" class="px-3 py-2 text-sm border rounded-lg focus:outline-none focus:ring-2 focus:ring-black">
                   
                </select>

            </div>

            <!-- Filter Row -->
            <div class="mt-3 grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3">

                <!-- Price -->
                <input type="text" placeholder="Price (AZN)"
                    class="px-3 py-2 text-sm border rounded-lg focus:outline-none focus:ring-2 focus:ring-black" />

                <!-- Odometer -->
                <input type="text" placeholder="Odometer (km)"
                    class="px-3 py-2 text-sm border rounded-lg focus:outline-none focus:ring-2 focus:ring-black" />

                <!-- Engine -->
                <input type="text" placeholder="Engine (L)"
                    class="px-3 py-2 text-sm border rounded-lg focus:outline-none focus:ring-2 focus:ring-black" />

                <!-- Credit -->
                <select class="px-3 py-2 text-sm border rounded-lg focus:outline-none focus:ring-2 focus:ring-black">
                    <option>Credit</option>
                    <option>Yes</option>
                    <option>No</option>
                </select>

                <!-- Barter -->
                <select class="px-3 py-2 text-sm border rounded-lg focus:outline-none focus:ring-2 focus:ring-black">
                    <option>Barter</option>
                    <option>Yes</option>
                    <option>No</option>
                </select>

                <!-- Currency -->
                <select class="px-3 py-2 text-sm border rounded-lg focus:outline-none focus:ring-2 focus:ring-black">
                    <option>Currency</option>
                    <option>AZN</option>
                </select>

            </div>

        </div>
    </nav>
    <div id="cardWrapper" class="max-w-7xl mx-auto px-4 py-6 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
       
    </div>
    <script src="./autoTemel.js"></script>
    </body>

</html>
