<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Document</title>

<body>
    <div class="min-h-screen bg-blue-200 p-5 flex flex-col gap-8">
        <div class="bg-blue-500 flex items-center justify-between p-4">
            <div class="md:flex justify-between items-center w-[60%]">
                <img class="shrink-0 md:w-16 md:h-16" src="./logo.033cf4ea.svg" alt="">
                    <ul class="flex gap-5 text-white font-bold hidden md:flex">
                        <li>Home</li>
                        <li>About</li>
                        <li>Contact</li>
                    </ul>
            </div>
             <i class="fa-solid fa-bars md:hidden"></i>
        </div>

        <div class="bg-white p-4 rounded-lg shadow-md flex flex-col gap-8">
            <h1 class="text-2xl font-bold text-gray-800">Welcome to Our Website</h1>
            <p class="text-gray-600 mt-2">This is a simple example of a responsive layout using Tailwind CSS.</p>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">

                <div class="w-full h-full object-contain
                    rounded-3xl">
                   <img class="w-full h-full object-contain
                    rounded-3xl" src="./leo-card-2x.png" alt="">

                <div class="w-full h-full object-contain

                   <img class="w-full h-full object-contain
                    rounded-3xl" src="./leo-card-2x.png" alt="">

            </div>
