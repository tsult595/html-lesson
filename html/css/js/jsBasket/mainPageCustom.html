    const yemexWrapper = document.querySelector('.cardWrapper');
    const priceInp = document.querySelector('#priceInp');
    const showPriceVal = document.querySelector('#showPriceVal');
    const searchInp = document.querySelector('#searchInp');
    const selectInp = document.querySelector('#selectInp');

    // Главная функция рендера
    function render(filteredItems) {
        yemexWrapper.innerHTML = '';

        if (filteredItems.length === 0) {
            yemexWrapper.innerHTML = `<p class="text-center mt-5">Ничего не найдено</p>`;
            return;
        }

        filteredItems.forEach(item => {
            yemexWrapper.innerHTML += `
                <div class="card" style="width: 18rem;">
                    <img src="${item.img}" class="card-img-top" alt="...">
                    <div class="card-body">
                        <h5 class="card-title">${item.name}</h5>
                        <h6 class="card-subtitle mb-2 text-muted">${item.category}</h6>
                        <p class="card-text">${item.composition}</p>
                        <a href="#" class="btn btn-primary">${item.price} AZN</a>
                    </div>
                </div>
            `;
        });
    }

    function applyFilters() {
        let filtered = yemex;
        const searchValue = searchInp.value.toLowerCase().trim();
        if (searchValue) {
            filtered = filtered.filter(item => 
                item.name.toLowerCase().includes(searchValue) ||
                item.category.toLowerCase().includes(searchValue) ||
                item.composition.toLowerCase().includes(searchValue)
            );
        }

        const maxPrice = Number(priceInp.value);
        showPriceVal.textContent = `${maxPrice} AZN`;
        filtered = filtered.filter(item => item.price <= maxPrice);


        const sortType = selectInp.value;

        if (sortType === 'low') {
            filtered.sort((a, b) => a.price - b.price);
        } else if (sortType === 'high') {
            filtered.sort((a, b) => b.price - a.price);
        } else if (sortType === 'moreFifty') {
            filtered = filtered.filter(item => item.price > 10);
        } else if (sortType === 'lessFifty') {
            filtered = filtered.filter(item => item.price <= 40);
        }

        render(filtered);
    }

    
    function priceFinder() {
        applyFilters();
    }

    function searchFinder() {
        applyFilters();
    }

    function sortFinder() {
        applyFilters();
    }


    render(yemex);
