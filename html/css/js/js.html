const checkSeason = function(month) {

let arr = [1,5,3,2,7,1,10]
 const arrok = function(arr){
 let newArr = []   
 for (let index = arr.length -1; index >= 0; index--) {
  newArr.push(arr[index]);
 }
  return newArr
 }

console.log(arrok(arr));
 


const sum = function(arr){
 let min = []
 for (let index = 0; index < arr.length; index++) {
    if(arr[index] < min){
     arr[index].push(min)
    }
    return min 
 }
}

console.log(sum([[2,5,3,2,7,1,10]]));

const minn = function(arr){
  let min = arr[0]
  arr.forEach(element => {
    if(element < min){
     min = element
    
    }
});
  return min
}

console.log(minn([2,5,3,2,7,1,10]));

const maxx = function(arr){
  let max = arr[0]
  arr.forEach(element=>{
    if(element > max){
     max = element
    }
})
  return max 
}

const summik = function(arr){
  let sum = 0
  arr.forEach(element=>{
    sum += element
  })
  return sum 
}

console.log(summik([5,5,5,5]));
